<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshSpawn — Live New Game Reviews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0e; --surface:#151519; --surface2:#1c1c22; --border:#2a2a32; --border2:#3b3b45;
  --txt:#f3f2ef; --muted:#9a99a1;
  --acc:#e0762a; --acc-deep:#c55f15; --acc-soft:rgba(224,118,42,.12);
  --green:#e68a3c; --blue:#e0762a; --orange:#c96e2c; --magenta:#a05832; --purple:#86858f; --yellow:#dd9440; --sh:#5a5a63;
  --px:'Space Grotesk',system-ui,sans-serif; --vt:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{color:var(--txt);font-family:var(--vt);font-size:15px;line-height:1.5;background-color:var(--bg);
  background-image:radial-gradient(760px 320px at 50% -16%, rgba(224,118,42,.06), transparent 72%);
  background-repeat:no-repeat;min-height:100vh;overflow-x:hidden}
.wrap{max-width:1100px;margin:0 auto;padding:0 18px 70px}

/* header */
header{padding:30px 0 18px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.logo{font-family:var(--px);font-size:38px;font-weight:700;letter-spacing:-1px;color:var(--txt);line-height:1;display:flex;align-items:center}
.logo .pt{width:0;height:0;border-left:15px solid var(--acc);border-top:10px solid transparent;border-bottom:10px solid transparent;margin-right:12px;display:inline-block}
.logo b{color:var(--acc);font-weight:700}
.tag{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:14px;text-transform:uppercase;letter-spacing:1.5px}
.marquee{margin-top:16px;overflow:hidden;white-space:nowrap;background:var(--surface);color:var(--acc);
  border:1px solid var(--border);border-radius:10px;padding:7px 0}
.marquee span{display:inline-block;padding-left:100%;animation:scroll 30s linear infinite;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.5px}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* section titles */
.section-title{font-family:var(--px);font-size:21px;font-weight:700;color:var(--txt);margin:32px 0 14px;display:flex;align-items:center;gap:11px}
.section-title::before{content:"";width:14px;height:14px;background:var(--acc);border-radius:3px;display:inline-block}

/* leaderboard */
.lb{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px;cursor:pointer;position:relative;
  transition:transform .14s,border-color .14s,box-shadow .14s}
.lb-card:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.lb-rank{font-family:var(--px);font-size:13px;font-weight:700;color:#140d05;background:var(--acc);
  width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.lb-cover{height:74px;border-radius:9px;margin:11px 0 8px;display:flex;align-items:center;justify-content:center;text-align:center;padding:5px;
  border:1px solid var(--border);overflow:hidden;background:#000}
.lb-cover span{font-family:var(--px);font-weight:700;font-size:13px;line-height:1.1;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.lb-name{font-size:14px;font-weight:700;line-height:1.15;min-height:36px;margin-top:4px;color:var(--txt)}
.lb-score{font-family:var(--px);font-size:20px;font-weight:700;margin-top:2px}

/* controls */
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:6px}
.controls input,.controls select{font-family:var(--vt);font-size:14px;color:var(--txt);background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.controls input{flex:1;min-width:200px}
.controls input::placeholder{color:#6f6f78}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
.controls select{cursor:pointer}
.count{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin:11px 2px 0}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:18px;margin-top:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;transition:transform .14s,border-color .14s,box-shadow .14s}
.card:hover{transform:translateY(-4px);border-color:var(--acc);box-shadow:0 12px 30px rgba(0,0,0,.55)}
.cover{height:132px;position:relative;display:flex;align-items:flex-end;padding:10px;background:#000;border-bottom:1px solid var(--border)}
.cover .gtitle{font-family:var(--px);font-weight:700;font-size:15px;line-height:1.1;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.85);z-index:2}
.badge{position:absolute;top:10px;right:10px;z-index:3;font-family:var(--px);font-weight:700;font-size:14px;padding:3px 10px;
  color:#140d05;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.card-body{padding:12px 14px 15px;flex:1;display:flex;flex-direction:column;gap:6px}
.c-name{font-size:17px;font-weight:700;line-height:1.12;color:var(--txt)}
.c-meta{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tag-pill{font-family:var(--mono);font-size:11px;padding:2px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted)}
.upc{background:var(--acc-soft);border-color:var(--acc);color:var(--acc);font-weight:700}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.on{display:flex}
.modal{max-width:720px;width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.7);overflow:hidden}
.m-titlebar{background:var(--surface2);color:var(--acc);font-family:var(--mono);font-weight:700;font-size:12.5px;
  padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.m-hero{height:170px;position:relative;display:flex;align-items:flex-end;padding:16px;background:#000;border-bottom:1px solid var(--border)}
.m-hero .gtitle{font-family:var(--px);font-weight:700;font-size:23px;line-height:1.1;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.85);position:relative;z-index:2}
.m-close{font-family:var(--px);font-weight:700;font-size:14px;color:var(--muted);background:transparent;
  border:1px solid var(--border2);border-radius:7px;width:26px;height:26px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.m-close:hover{background:var(--acc);color:#140d05;border-color:var(--acc)}
.m-body{padding:20px 22px 26px}
.m-top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start}
.m-name{font-family:var(--px);font-size:24px;font-weight:700;line-height:1.12;color:var(--txt);flex:1;min-width:230px}
.m-scorebox{text-align:center;padding:9px 17px;min-width:92px;color:#140d05;border-radius:13px}
.m-scorebox .n{font-family:var(--px);font-size:27px;font-weight:700}
.m-scorebox .l{font-family:var(--mono);font-size:10.5px;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.m-meta{display:flex;flex-wrap:wrap;gap:8px;margin:17px 0}
.consensus{font-size:15px;line-height:1.55;margin:15px 0;color:var(--txt);background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;border-left:4px solid var(--acc);padding:13px 16px}
.hl-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--acc);margin:20px 0 10px;text-transform:uppercase;letter-spacing:1.5px}
.hl{list-style:none;display:flex;flex-direction:column;gap:8px}
.hl li{font-size:14.5px;line-height:1.4;padding-left:26px;position:relative;color:var(--txt)}
.hl li::before{content:"\25B8";position:absolute;left:4px;color:var(--acc);font-weight:700}
.bars{margin-top:6px;display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-row .lbl{font-family:var(--mono);font-size:12px;width:110px;color:var(--muted);text-transform:capitalize}
.bar{flex:1;height:14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.bar i{display:block;height:100%}
.bar-row .v{font-family:var(--mono);font-size:12px;font-weight:700;width:40px;text-align:right;color:var(--txt)}
footer{font-family:var(--mono);text-align:center;color:var(--muted);font-size:12px;margin-top:42px;line-height:1.7;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px}
footer a{color:var(--acc)}
footer b{color:var(--txt)}

/* media + added components */
.cover.has-img .gtitle,.m-hero.has-img .gtitle{background:rgba(0,0,0,.6);padding:3px 8px;border-radius:6px}
.cover{background-size:cover;background-position:center}
.lb-cover{background-size:cover;background-position:center}
.m-hero{background-size:cover;background-position:center}
.rate-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin:18px 0}
.rate-title{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--acc);margin-bottom:9px;text-transform:uppercase;letter-spacing:1.5px}
.stars{display:flex;gap:4px}
.star{cursor:pointer;font-size:28px;line-height:1;color:#3a3a42;transition:transform .08s,color .08s;user-select:none}
.star:hover{transform:scale(1.18)}
.star.on{color:var(--acc)}
.pr{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:9px}
.about{font-size:14px;line-height:1.6;color:var(--txt)}
@media(max-width:780px){.lb{grid-template-columns:repeat(2,1fr)}.logo{font-size:30px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><span class="pt" aria-hidden="true"></span>Fresh<b>Spawn</b></div>
    <div class="tag">// new game releases &amp; reviews &mdash; 2025&ndash;2026 //</div>
    <div class="marquee"><span id="ticker">loading the latest drops...</span></div>
  </header>

  <div class="section-title">top rated</div>
  <div class="lb" id="leaderboard"></div>

  <div class="section-title">the library</div>
  <div class="controls">
    <input id="search" type="text" placeholder="search games, studios, genres...">
    <select id="genre"><option value="">all genres</option></select>
    <select id="status"><option value="">all status</option><option value="released">released</option><option value="upcoming">upcoming</option></select>
    <select id="sort">
      <option value="score">sort: score &darr;</option>
      <option value="date">sort: newest</option>
      <option value="name">sort: A&ndash;Z</option>
    </select>
  </div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <footer>
    Live game data &amp; cover art powered by <b><a href="https://rawg.io" target="_blank" rel="noopener" style="color:var(--blue-dk)">RAWG</a></b>.
    Your personal star ratings are saved privately in your browser. &middot; FreshSpawn
  </footer>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
const FUNC='/.netlify/functions/games';
const NOW=new Date();
const PLAT={'PlayStation 5':'PS5','PlayStation 4':'PS4','PlayStation 3':'PS3','Xbox Series S/X':'Xbox X|S','Xbox One':'Xbox One','Xbox 360':'X360','Nintendo Switch':'Switch','PC':'PC','macOS':'Mac','Linux':'Linux','iOS':'iOS','Android':'Android'};
function splat(n){return PLAT[n]||n;}

const grid=document.getElementById('grid'),lb=document.getElementById('leaderboard'),
 search=document.getElementById('search'),genreSel=document.getElementById('genre'),
 statusSel=document.getElementById('status'),sortSel=document.getElementById('sort'),
 countEl=document.getElementById('count'),ticker=document.getElementById('ticker');

const PAL=["#ff8c2b","#ff6a00","#e0762a","#c2632a","#8a5230","#caa46a","#a86a2e","#ffb24d"];
function art(t){let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))>>>0;
  const a=PAL[h%PAL.length],b=PAL[(h>>3)%PAL.length],ang=(h%4)*45;
  return `linear-gradient(${ang}deg, ${a}, ${b})`;}
function scoreColor(s){if(s==null)return "var(--purple)";if(s>=90)return "var(--green)";if(s>=80)return "var(--blue)";if(s>=70)return "var(--orange)";return "var(--magenta)";}
function fmtDate(d){if(!d)return 'TBA';const x=new Date(d+'T00:00');if(isNaN(x))return 'TBA';return x.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
function isUpcoming(g){return !g.date || new Date(g.date+'T00:00')>NOW;}
function coverStyle(g){return g.cover?`background-image:url('${g.cover}')`:`background:${art(g.t)}`;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function stripHtml(s){return String(s||'').replace(/<[^>]*>/g,'').replace(/\s+/g,' ');}
function firstSentences(s,n){const m=s.match(/[^.!?]+[.!?]+/g);return m?m.slice(0,n).join(' ').trim():s.slice(0,200);}

function ratings(){try{return JSON.parse(localStorage.getItem('nr_ratings')||'{}')}catch(e){return{}}}
function myRating(id){return ratings()[id]||0;}
function saveRating(id,n){const r=ratings();if((r[id]||0)===n)delete r[id];else r[id]=n;localStorage.setItem('nr_ratings',JSON.stringify(r));}

function mapGame(g){return{
  id:g.id,t:g.name,
  genre:(g.genres&&g.genres[0]&&g.genres[0].name)||'Game',
  plat:[...new Set((g.platforms||[]).map(p=>splat(p.platform.name)))].slice(0,6),
  date:g.released||'',
  score:(g.metacritic==null?null:g.metacritic),
  cover:g.background_image||'',
  pr:g.rating||0,prc:g.ratings_count||0,
  ratings:g.ratings||[],
  desc:g.description_raw||''};}

async function api(path,params){
  const qs=new URLSearchParams(params||{});qs.set('path',path);
  const r=await fetch(FUNC+'?'+qs.toString());
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();}

let GAMES=[],SRC='';
async function load(){
  countEl.textContent='Loading the latest games…';
  const y=NOW.getFullYear(),today=NOW.toISOString().slice(0,10);
  try{
    const [top,soon]=await Promise.all([
      api('games',{dates:(y-1)+'-01-01,'+y+'-12-31',ordering:'-metacritic',page_size:'40',exclude_additions:'true'}),
      api('games',{dates:today+','+(y+1)+'-12-31',ordering:'-added',page_size:'12'})
    ]);
    const map={};
    [...(top.results||[]),...(soon.results||[])].forEach(g=>{map[g.id]=mapGame(g);});
    GAMES=Object.values(map);
    if(!GAMES.length)throw new Error('empty');
    SRC='Live data from RAWG';
  }catch(e){
    GAMES=SAMPLE.map(mapGame);
    SRC='Preview mode (sample data) — deploy to Netlify with your RAWG key to go live';
  }
  buildGenres();setTicker();leaderboard();render();
}

function buildGenres(){
  genreSel.innerHTML='<option value="">all genres</option>';
  [...new Set(GAMES.map(g=>g.genre))].sort().forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g.toLowerCase();genreSel.appendChild(o);});
}
function setTicker(){
  ticker.textContent='NEW & TOP RATED:  '+GAMES.slice().sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,10)
    .map(g=>g.t.toUpperCase()+(g.score?' ['+g.score+']':'')).join('   •   ');
}
function leaderboard(){
  const top=GAMES.filter(g=>g.score!=null).sort((a,b)=>b.score-a.score).slice(0,5);
  lb.innerHTML=top.map((g,i)=>`<div class="lb-card" data-id="${g.id}">
    <div class="lb-rank">#${i+1}</div>
    <div class="lb-cover ${g.cover?'has-img':''}" style="${coverStyle(g)}"><span>${esc(g.t)}</span></div>
    <div class="lb-name">${esc(g.t)}</div>
    <div class="lb-score" style="color:${scoreColor(g.score)}">${g.score}</div></div>`).join('');
}
function render(){
  const q=search.value.toLowerCase().trim(),gf=genreSel.value,sf=statusSel.value,so=sortSel.value;
  let list=GAMES.filter(g=>{
    const match=!q||g.t.toLowerCase().includes(q)||g.genre.toLowerCase().includes(q);
    const gok=!gf||g.genre===gf;
    const up=isUpcoming(g);
    const sok=!sf||(sf==='upcoming'?up:!up);
    return match&&gok&&sok;});
  list.sort((a,b)=>{
    if(so==='name')return a.t.localeCompare(b.t);
    if(so==='date')return new Date(b.date||0)-new Date(a.date||0);
    return (b.score==null?-1:b.score)-(a.score==null?-1:a.score);});
  countEl.textContent=(SRC?SRC+'  ·  ':'')+list.length+' game'+(list.length!==1?'s':'')+' shown';
  grid.innerHTML=list.map(g=>{
    const up=isUpcoming(g),mine=myRating(g.id);
    const badge=up?`<div class="badge" style="background:var(--purple)">SOON</div>`
      :g.score==null?`<div class="badge" style="background:var(--sh)">NR</div>`
      :`<div class="badge" style="background:${scoreColor(g.score)}">${g.score}</div>`;
    return `<div class="card" data-id="${g.id}">
      <div class="cover ${g.cover?'has-img':''}" style="${coverStyle(g)}">${badge}<div class="gtitle">${esc(g.t)}</div></div>
      <div class="card-body">
        <div class="c-name">${esc(g.t)}</div>
        <div class="c-meta">${esc(g.genre)} &middot; ${fmtDate(g.date)}</div>
        <div class="tags"><span class="tag-pill">${esc(g.genre)}</span>
          ${up?'<span class="tag-pill upc">upcoming</span>':''}
          ${mine?`<span class="tag-pill" style="background:rgba(255,140,43,.16);border:1px solid #ff8c2b;color:#ff8c2b;font-weight:700">&#9733; ${mine}/5</span>`:''}</div>
      </div></div>`;}).join('');
}

function ratingsBars(rs){
  const col={exceptional:'var(--green)',recommended:'var(--blue)',meh:'var(--orange)',skip:'var(--magenta)'};
  return '<div class="bars">'+rs.map(r=>`<div class="bar-row"><span class="lbl">${esc(r.title)}</span><div class="bar"><i style="width:${Math.round(r.percent)}%;background:${col[r.title]||'var(--blue)'}"></i></div><span class="v">${Math.round(r.percent)}%</span></div>`).join('')+'</div>';
}
async function openModal(id){
  const g=GAMES.find(x=>String(x.id)===String(id));if(!g)return;
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="m-titlebar"><span>game_info.exe</span><button class="m-close" id="mclose">&#10005;</button></div><div class="m-hero ${g.cover?'has-img':''}" style="${coverStyle(g)}"><div class="gtitle">${esc(g.t)}</div></div><div class="m-body"><p style="color:var(--muted)">Loading details&hellip;</p></div>`;
  document.getElementById('overlay').classList.add('on');
  document.getElementById('mclose').onclick=closeModal;
  let d={};
  try{d=await api('games/'+g.id,{});}catch(e){}
  renderModal(g,d);
}
function renderModal(g,d){
  const up=isUpcoming(g);
  const dev=(d.developers&&d.developers.map(x=>x.name).join(', '))||'';
  const desc=stripHtml(d.description_raw||g.desc||'').trim();
  const consensus=desc?firstSentences(desc,2):(up?'Not yet released — full details and reviews to come.':'');
  const breakdown=(g.ratings&&g.ratings.length)?ratingsBars(g.ratings):'';
  const scoreTxt=up?'SOON':(g.score==null?'NR':g.score);
  const sc=scoreColor(g.score),mine=myRating(g.id);
  const stars=[1,2,3,4,5].map(n=>`<span class="star ${n<=mine?'on':''}" data-star="${n}" data-gid="${g.id}">&#9733;</span>`).join('');
  const pr=g.prc?`RAWG community score: <b>${g.pr.toFixed(1)}/5</b> from ${g.prc.toLocaleString()} ratings`:'No community ratings yet';
  document.getElementById('modal').innerHTML=`
    <div class="m-titlebar"><span>game_info.exe</span><button class="m-close" id="mclose">&#10005;</button></div><div class="m-hero ${g.cover?'has-img':''}" style="${coverStyle(g)}"><div class="gtitle">${esc(g.t)}</div></div>
    <div class="m-body">
      <div class="m-top"><div class="m-name">${esc(g.t)}</div>
        <div class="m-scorebox" style="background:${sc}"><div class="n">${scoreTxt}</div><div class="l">${up?'unreleased':(g.score==null?'no score':'metascore')}</div></div></div>
      <div class="m-meta"><span class="tag-pill">${esc(g.genre)}</span>${dev?`<span class="tag-pill">${esc(dev)}</span>`:''}<span class="tag-pill">${fmtDate(g.date)}</span>${g.plat.map(p=>`<span class="tag-pill" style="background:#1c1c22;border:1px solid #3b3b45;color:#c8c7cf">${esc(p)}</span>`).join('')}</div>
      ${consensus?`<div class="consensus">${esc(consensus)}</div>`:''}
      <div class="rate-box"><div class="rate-title">Rate it yourself</div><div class="stars">${stars}</div><div class="pr">${pr}</div></div>
      ${breakdown?`<div class="hl-title">Player review breakdown</div>${breakdown}`:''}
      ${desc?`<div class="hl-title">About</div><div class="about">${esc(desc).slice(0,900)}${desc.length>900?'&hellip;':''}</div>`:''}
    </div>`;
  document.getElementById('mclose').onclick=closeModal;
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}

document.addEventListener('click',e=>{
  const st=e.target.closest('[data-star]');
  if(st){const id=st.dataset.gid,n=+st.dataset.star;saveRating(id,n);
    const mine=myRating(id);
    document.querySelectorAll('.stars .star').forEach(s=>s.classList.toggle('on',+s.dataset.star<=mine));
    render();return;}
  const c=e.target.closest('[data-id]');
  if(c){openModal(c.dataset.id);return;}
  if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
[search,genreSel,statusSel,sortSel].forEach(el=>el.addEventListener('input',render));
